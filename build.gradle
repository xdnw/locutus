/**
 * Generic runner: call any main without adding a new task each time
 * Usage: gradlew runMain -PmainClass=fully.qualified.MainClass [-PappArgs="a b"] [-PjvmArgs="-Xmx512m"]
 * Test harness mains should use gradlew runTestMain ... to include test classes and resources.
 *
 * Generate JTE
 * .\gradlew -PwithJtePrecompile generateJte
 * Include JTE in shadowJar (with precompile)
 * .\gradlew -PwithJtePrecompile shadowJar
 *
 * Generate GraphQL
 * .\gradlew -Pgraphql graphqlCodegen
 */

