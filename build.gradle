tasks.register('runCustomMain', JavaExec) {
    group = 'application'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'link.locutus.discord._test.ToolUseTest'
    standardInput = System.in
    if (project.hasProperty('appArgs')) {
        args = project.property('appArgs').toString().split(/\s+/)
    }
}

def configureGenericMainRun = { task, runtimeClasspath, includeTests ->
    task.group = 'application'
    task.classpath = runtimeClasspath
    task.standardInput = System.in

    // Keep task registration lazy so IDE Gradle model sync does not fail.
    def suppliedMain = providers.gradleProperty('mainClass')
            .orElse(providers.systemProperty('mainClass'))
            .orElse(providers.environmentVariable('MAIN_CLASS'))
    def suppliedArgs = providers.gradleProperty('appArgs')
            .orElse(providers.systemProperty('appArgs'))
    def suppliedJvmArgs = providers.gradleProperty('jvmArgs')
            .orElse(providers.systemProperty('jvmArgs'))

    task.mainClass.convention(suppliedMain)

    task.doFirst {
        if (!task.mainClass.isPresent()) {
            throw new GradleException("Please specify -PmainClass=fully.qualified.Main or -DmainClass=... or set MAIN_CLASS env var")
        }

        def argsValue = suppliedArgs.orNull
        if (argsValue) {
            args argsValue.toString().split(/\s+/)
        }

        def jvmArgsValue = suppliedJvmArgs.orNull
        if (jvmArgsValue) {
            jvmArgs jvmArgsValue.toString().split(/\s+/)
        }
    }

    task.dependsOn tasks.named('classes')
    if (includeTests) {
        task.dependsOn tasks.named('testClasses')
    }
}

tasks.register('runMain', JavaExec) {
    description = 'Run any main class on the main runtime classpath: -PmainClass=... or -DmainClass=... or env MAIN_CLASS'
    configureGenericMainRun(delegate, sourceSets.main.runtimeClasspath, false)
}

tasks.register('runTestMain', JavaExec) {
    description = 'Run any main class on the main+test runtime classpath: -PmainClass=... or -DmainClass=... or env MAIN_CLASS'
    configureGenericMainRun(delegate, sourceSets.main.runtimeClasspath + sourceSets.test.runtimeClasspath, true)
}

