tasks.register('offshoreJmh', JavaExec) {
    group = 'verification'
    description = 'Run JMH benchmarks for the real-data offshore loading and processing pipeline'
    notCompatibleWithConfigurationCache('Offshore JMH arguments are assembled dynamically at execution time.')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'org.openjdk.jmh.Main'
    standardInput = System.in

    def include = providers.gradleProperty('offshoreJmhInclude')
            .orElse('^link\\.locutus\\.discord\\.db\\.OffshoreTest.*')
    def warmups = providers.gradleProperty('offshoreJmhWarmups').orElse('3')
    def measurements = providers.gradleProperty('offshoreJmhMeasurements').orElse('5')
    def forks = providers.gradleProperty('offshoreJmhForks').orElse('1')
    def warmupTime = providers.gradleProperty('offshoreJmhWarmupTime').orElse('1s')
    def measurementTime = providers.gradleProperty('offshoreJmhMeasurementTime').orElse('1s')
    def resultFormat = providers.gradleProperty('offshoreJmhResultFormat').orElse('json')
    def resultFile = providers.gradleProperty('offshoreJmhResultFile')
            .orElse(layout.buildDirectory.file('reports/jmh/offshore.json').map { it.asFile.absolutePath })
    def profilers = providers.gradleProperty('offshoreJmhProfilers').orElse('')
    def extraArgs = providers.gradleProperty('offshoreJmhExtraArgs').orElse('')

    doFirst {
        File output = file(resultFile.get())
        if (output.parentFile != null) {
            output.parentFile.mkdirs()
        }

        def cliArgs = [
                include.get(),
                '-wi', warmups.get(),
                '-i', measurements.get(),
                '-f', forks.get(),
                '-w', warmupTime.get(),
                '-r', measurementTime.get(),
                '-rf', resultFormat.get(),
                '-rff', output.absolutePath
        ]

        profilers.get().split(/\s*,\s*/).findAll { !it.isBlank() }.each { profiler ->
            cliArgs += ['-prof', profiler]
        }

        if (extraArgs.get()) {
            cliArgs += extraArgs.get().toString().split(/\s+/).findAll { !it.isBlank() }
        }

        setArgs(cliArgs)
    }

    dependsOn tasks.named('testClasses')
}

